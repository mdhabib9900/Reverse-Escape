name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools-version: 34.0.0
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Create www directory
      run: |
        mkdir -p www
        cp index.html www/
        cp manifest.json www/
        cp -r icons www/ || true
    
    - name: Add Android platform
      run: cordova platform add android
    
    - name: Build APK (Release)
      run: cordova build android --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Reverse-Escape-APK
        path: platforms/android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: platforms/android/app/build/outputs/apk/release/app-release.apk
        tag_name: v${{ github.run_number }}
        generate_release_notes: true
        body: |
          🎮 **Reverse Escape - APK Build**
          
          Automatically built with GitHub Actions
          
          📱 **How to Install:**
          1. Enable Unknown Sources: Settings > Security > Unknown sources
          2. Download the APK file below
          3. Open the APK and tap Install
          4. Enjoy the game! 🎉
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
